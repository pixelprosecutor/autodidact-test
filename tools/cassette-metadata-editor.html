<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Autodidact Cassette Metadata Editor</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #071327;
        --panel: #102344;
        --panel-2: #162d55;
        --ink: #f4f8ff;
        --muted: #aebcce;
        --line: #2f4770;
        --gold: #ffbf35;
        --green: #6ff09e;
        --red: #ff6d6d;
        --focus: #63d9ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100vh;
        overflow: hidden;
        background: var(--bg);
        color: var(--ink);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        border: 1px solid var(--line);
        background: var(--panel-2);
        color: var(--ink);
        min-height: 42px;
        border-radius: 8px;
        padding: 0 14px;
        cursor: pointer;
      }

      button:hover,
      button:focus-visible,
      input:focus,
      select:focus,
      textarea:focus {
        outline: 2px solid var(--focus);
        outline-offset: 2px;
      }

      button.primary {
        background: var(--gold);
        border-color: var(--gold);
        color: #1a1300;
        font-weight: 700;
      }

      button.danger {
        border-color: #7d3547;
        background: #3a1830;
      }

      .app {
        height: 100vh;
        display: grid;
        grid-template-rows: auto auto 1fr;
        overflow: hidden;
      }

      .topbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 12px;
        padding: 16px;
        border-bottom: 1px solid var(--line);
        background: #091a34;
      }

      .brand {
        min-width: 220px;
        margin-right: auto;
      }

      .brand h1 {
        margin: 0;
        font-size: 20px;
        line-height: 1.1;
      }

      .brand p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .hidden-input {
        display: none;
      }

      .status {
        color: var(--muted);
        font-size: 13px;
        min-width: min(100%, 260px);
      }

      .tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 12px 16px 0;
        background: #091a34;
      }

      .tab-button[aria-selected="true"] {
        background: var(--gold);
        border-color: var(--gold);
        color: #1a1300;
        font-weight: 700;
      }

      .tab-panel {
        min-height: 0;
        overflow: hidden;
      }

      .tab-panel:not(.active) {
        display: none;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(280px, 380px) minmax(0, 1fr);
        height: 100%;
        min-height: 0;
        overflow: hidden;
      }

      .sidebar,
      .editor {
        min-height: 0;
        height: 100%;
        overflow: auto;
        padding: 16px;
      }

      .sidebar {
        border-right: 1px solid var(--line);
        background: #0a1931;
      }

      .toolbar {
        display: grid;
        gap: 10px;
        margin-bottom: 14px;
      }

      .toolbar-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 12px;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        background: #071225;
        color: var(--ink);
        border-radius: 8px;
        padding: 10px;
      }

      textarea {
        min-height: 96px;
        resize: vertical;
      }

      .list {
        display: grid;
        gap: 8px;
      }

      .cassette-row,
      .achievement-row,
      .store-row {
        display: grid;
        grid-template-columns: 42px minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
        width: 100%;
        text-align: left;
        min-height: 58px;
        padding: 8px;
      }

      .cassette-row[aria-selected="true"],
      .achievement-row[aria-selected="true"],
      .store-row[aria-selected="true"] {
        border-color: var(--focus);
        box-shadow: 0 0 0 1px var(--focus) inset;
      }

      .cassette-row img,
      .achievement-row img,
      .store-row img {
        width: 34px;
        height: 34px;
        object-fit: contain;
        image-rendering: pixelated;
      }

      .row-title {
        display: block;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-weight: 700;
      }

      .row-subtitle {
        display: block;
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .pill {
        border: 1px solid var(--line);
        color: var(--muted);
        border-radius: 999px;
        padding: 4px 8px;
        font-size: 12px;
      }

      .editor {
        background: var(--bg);
      }

      .panel {
        max-width: 980px;
        margin: 0 auto 16px;
        border: 1px solid var(--line);
        background: var(--panel);
        border-radius: 8px;
        padding: 16px;
      }

      .preview {
        display: grid;
        grid-template-columns: 96px minmax(0, 1fr);
        gap: 18px;
        align-items: center;
      }

      .achievement-preview {
        grid-template-columns: minmax(180px, 260px) minmax(0, 1fr);
        align-items: start;
      }

      .small-preview {
        display: grid;
        place-items: center;
        min-height: 96px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #071225;
      }

      .small-preview img {
        width: 34px;
        height: 34px;
        object-fit: contain;
        image-rendering: pixelated;
      }

      .large-preview {
        display: grid;
        place-items: center;
        min-height: 230px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #071225;
        overflow: hidden;
      }

      .large-preview img {
        width: min(100%, 576px);
        max-height: 360px;
        object-fit: contain;
        image-rendering: pixelated;
      }

      .achievement-art-preview {
        display: grid;
        place-items: center;
        min-height: 180px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #071225;
        overflow: hidden;
      }

      .achievement-art-preview img {
        width: min(100%, 240px);
        max-height: 220px;
        object-fit: contain;
        image-rendering: pixelated;
      }

      .store-art-preview {
        display: grid;
        place-items: center;
        min-height: 230px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #071225;
        overflow: hidden;
      }

      .store-art-preview img {
        width: min(100%, 520px);
        max-height: 320px;
        object-fit: contain;
        image-rendering: pixelated;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .form-grid .wide {
        grid-column: 1 / -1;
      }

      .check-row {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--ink);
        min-height: 44px;
      }

      .check-row input {
        width: 20px;
        height: 20px;
      }

      .json-panel {
        display: grid;
        gap: 12px;
      }

      .json-output {
        min-height: 180px;
        font-family: Consolas, "Courier New", monospace;
        font-size: 12px;
      }

      .counts {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .empty {
        color: var(--muted);
        border: 1px dashed var(--line);
        border-radius: 8px;
        padding: 20px;
      }

      .placeholder-panel {
        max-width: 760px;
      }

      .art-tools {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 8px;
      }

      .art-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(116px, 1fr));
        gap: 10px;
        max-height: 520px;
        overflow: auto;
      }

      .art-card {
        display: grid;
        gap: 8px;
        justify-items: center;
        min-height: 142px;
        padding: 10px;
        text-align: center;
      }

      .art-card[aria-selected="true"] {
        border-color: var(--focus);
        box-shadow: 0 0 0 1px var(--focus) inset;
      }

      .art-card img {
        width: 86px;
        height: 86px;
        object-fit: contain;
        image-rendering: pixelated;
      }

      .art-card small {
        display: block;
        width: 100%;
        color: var(--muted);
        font-size: 11px;
        overflow-wrap: anywhere;
      }

      @media (max-width: 820px) {
        .workspace {
          grid-template-columns: 1fr;
        }

        .sidebar {
          border-right: 0;
          border-bottom: 1px solid var(--line);
          max-height: 45vh;
        }

        .form-grid,
        .preview {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="brand">
          <h1>Autodidact Management</h1>
          <p>Edit cassette art metadata and achievement definitions.</p>
        </div>
        <button id="loadDefault" class="primary">Load Cassettes</button>
        <button id="loadAchievements">Load Achievements</button>
        <span id="status" class="status">Ready.</span>
      </header>

      <nav class="tabs" aria-label="Management sections">
        <button class="tab-button" data-tab="cassettes" aria-selected="true">Cassettes</button>
        <button class="tab-button" data-tab="achievements" aria-selected="false">Achievements</button>
        <button class="tab-button" data-tab="stores" aria-selected="false">Stores</button>
      </nav>

      <section id="cassettesTab" class="tab-panel active">
        <section class="workspace">
          <aside class="sidebar">
            <div class="toolbar">
              <label>
                Search
                <input id="search" type="search" placeholder="Name, pack, color, style">
              </label>
              <div class="toolbar-row">
                <label>
                  Pack
                  <select id="packFilter"></select>
                </label>
                <label>
                  Rarity
                  <select id="rarityFilter">
                    <option value="">All</option>
                    <option value="common">common</option>
                    <option value="uncommon">uncommon</option>
                    <option value="rare">rare</option>
                    <option value="special">special</option>
                  </select>
                </label>
              </div>
              <div id="counts" class="counts"></div>
            </div>
            <div id="cassetteList" class="list"></div>
          </aside>

          <section class="editor">
            <div id="emptyState" class="panel empty">Load cassette metadata to begin.</div>

            <section id="editPanel" class="panel" hidden>
              <div class="preview">
                <div class="small-preview">
                  <img id="iconPreview" alt="">
                </div>
                <div class="large-preview">
                  <img id="largePreview" alt="">
                </div>
              </div>
            </section>

            <section id="formPanel" class="panel" hidden>
              <div class="form-grid">
                <label>
                  ID
                  <input id="fieldId" disabled>
                </label>
                <label>
                  Name
                  <input id="fieldName">
                </label>
                <label>
                  Pack
                  <input id="fieldPack" list="packOptions">
                </label>
                <label>
                  Order Number
                  <input id="fieldOrderNumber" type="number" min="1" step="1">
                </label>
                <label>
                  Rarity
                  <select id="fieldRarity">
                    <option value="common">common</option>
                    <option value="uncommon">uncommon</option>
                    <option value="rare">rare</option>
                    <option value="special">special</option>
                  </select>
                </label>
                <label>
                  Color
                  <input id="fieldColor" list="colorOptions">
                </label>
                <label>
                  Style
                  <input id="fieldStyle" list="styleOptions">
                </label>
                <label class="check-row">
                  <input id="fieldEnabled" type="checkbox">
                  Enabled for assignment
                </label>
                <label class="check-row">
                  <input id="fieldStoreExclusive" type="checkbox">
                  Store-exclusive cassette
                </label>
                <label>
                  Exclusive Store ID
                  <select id="fieldStoreId"></select>
                </label>
                <label class="wide">
                  Notes
                  <textarea id="fieldNotes"></textarea>
                </label>
                <label class="wide">
                  Icon Path
                  <input id="fieldIcon">
                </label>
                <label class="wide">
                  Large Art Path
                  <input id="fieldLarge">
                </label>
              </div>
            </section>

            <section class="panel json-panel">
              <div class="counts">
                <button id="importButton">Import Cassette JSON</button>
                <input id="importFile" class="hidden-input" type="file" accept="application/json,.json">
                <button id="copyJson">Copy Cassette JSON</button>
                <button id="downloadJson">Download Cassette JSON</button>
              </div>
              <div class="counts" id="exportSummary"></div>
              <textarea id="jsonOutput" class="json-output" readonly spellcheck="false"></textarea>
            </section>
          </section>
        </section>
      </section>

      <section id="achievementsTab" class="tab-panel">
        <section class="workspace">
          <aside class="sidebar">
            <div class="toolbar">
              <label>
                Search
                <input id="achievementSearch" type="search" placeholder="Name, category, condition">
              </label>
              <div class="toolbar-row">
                <label>
                  Category
                  <select id="achievementCategoryFilter"></select>
                </label>
                <label>
                  Rarity
                  <select id="achievementRarityFilter">
                    <option value="">All</option>
                    <option value="common">common</option>
                    <option value="uncommon">uncommon</option>
                    <option value="rare">rare</option>
                    <option value="special">special</option>
                  </select>
                </label>
              </div>
              <div id="achievementCounts" class="counts"></div>
            </div>
            <div id="achievementList" class="list"></div>
          </aside>

          <section class="editor">
            <div id="achievementEmptyState" class="panel empty">Load achievement metadata to begin.</div>

            <section id="achievementPreviewPanel" class="panel" hidden>
              <div class="preview achievement-preview">
                <div class="achievement-art-preview">
                  <img id="achievementImagePreview" alt="">
                </div>
                <div>
                  <div class="counts" id="achievementProgressSummary"></div>
                  <div class="art-tools">
                    <button id="cleanAchievementImagePath" type="button">Clean Image Path</button>
                    <button id="openAchievementImage" type="button">Open Image</button>
                    <button id="loadAchievementArt" type="button">Load Art Picker</button>
                  </div>
                </div>
              </div>
            </section>

            <section id="achievementFormPanel" class="panel" hidden>
              <div class="form-grid">
                <label>
                  ID
                  <input id="achievementFieldId" disabled>
                </label>
                <label>
                  Name
                  <input id="achievementFieldName">
                </label>
                <label>
                  Category
                  <input id="achievementFieldCategory" list="achievementCategoryOptions">
                </label>
                <label>
                  Condition Type
                  <select id="achievementFieldConditionType">
                    <option value="completed_listens_total">completed_listens_total</option>
                    <option value="total_listening_seconds">total_listening_seconds</option>
                    <option value="daily_listening_seconds">daily_listening_seconds</option>
                    <option value="same_file_completions">same_file_completions</option>
                    <option value="unique_cassettes_collected">unique_cassettes_collected</option>
                    <option value="duplicate_cassette_assignments">duplicate_cassette_assignments</option>
                    <option value="completed_files_in_folder">completed_files_in_folder</option>
                    <option value="complete_long_file_seconds">complete_long_file_seconds</option>
                    <option value="weekend_listening_sessions">weekend_listening_sessions</option>
                    <option value="listening_streak_days">listening_streak_days</option>
                    <option value="downloaded_files_total">downloaded_files_total</option>
                    <option value="offline_local_plays">offline_local_plays</option>
                    <option value="rare_cassettes_collected">rare_cassettes_collected</option>
                    <option value="cassettes_collected_in_pack">cassettes_collected_in_pack</option>
                  </select>
                </label>
                <label>
                  Target
                  <input id="achievementFieldTarget" type="number" min="1" step="1">
                </label>
                <label>
                  Rarity
                  <select id="achievementFieldRarity">
                    <option value="common">common</option>
                    <option value="uncommon">uncommon</option>
                    <option value="rare">rare</option>
                    <option value="special">special</option>
                  </select>
                </label>
                <label class="check-row">
                  <input id="achievementFieldEnabled" type="checkbox">
                  Enabled
                </label>
                <label class="check-row">
                  <input id="achievementFieldHidden" type="checkbox">
                  Hidden until unlocked
                </label>
                <label class="check-row">
                  <input id="achievementFieldRepeatable" type="checkbox">
                  Repeatable
                </label>
                <label class="wide">
                  Description
                  <textarea id="achievementFieldDescription"></textarea>
                </label>
                <label class="wide">
                  Image Path
                  <input id="achievementFieldImage">
                </label>
                <label class="wide">
                  Notes
                  <textarea id="achievementFieldNotes"></textarea>
                </label>
              </div>
            </section>

            <section class="panel json-panel">
              <div class="counts">
                <button id="achievementImportButton">Import Achievement JSON</button>
                <input id="achievementImportFile" class="hidden-input" type="file" accept="application/json,.json">
                <button id="achievementCopyJson">Copy Achievement JSON</button>
                <button id="achievementDownloadJson">Download Achievement JSON</button>
              </div>
              <div class="counts" id="achievementExportSummary"></div>
              <textarea id="achievementJsonOutput" class="json-output" readonly spellcheck="false"></textarea>
            </section>

            <section class="panel json-panel">
              <div class="counts" id="achievementArtSummary"></div>
              <div id="achievementArtGrid" class="art-grid"></div>
            </section>
          </section>
        </section>
      </section>

      <section id="storesTab" class="tab-panel">
        <section class="workspace">
          <aside class="sidebar">
            <div class="toolbar">
              <label>
                Search
                <input id="storeSearch" type="search" placeholder="Name, theme, condition">
              </label>
              <div id="storeCounts" class="counts"></div>
            </div>
            <div id="storeList" class="list"></div>
          </aside>

          <section class="editor">
            <div id="storeEmptyState" class="panel empty">Load store metadata to begin.</div>

            <section id="storePreviewPanel" class="panel" hidden>
              <div class="store-art-preview">
                <img id="storeImagePreview" alt="">
              </div>
            </section>

            <section id="storeFormPanel" class="panel" hidden>
              <div class="form-grid">
                <label>
                  ID
                  <input id="storeFieldId" disabled>
                </label>
                <label>
                  Name
                  <input id="storeFieldName">
                </label>
                <label>
                  Theme
                  <input id="storeFieldTheme">
                </label>
                <label>
                  Status
                  <select id="storeFieldStatus">
                    <option value="comingSoon">comingSoon</option>
                    <option value="unlocked">unlocked</option>
                    <option value="locked">locked</option>
                  </select>
                </label>
                <label>
                  Store Type
                  <input id="storeFieldStoreType">
                </label>
                <label>
                  Unlock Condition
                  <input id="storeFieldUnlockCondition">
                </label>
                <label class="check-row">
                  <input id="storeFieldEnabled" type="checkbox">
                  Enabled
                </label>
                <label class="check-row">
                  <input id="storeFieldLocked" type="checkbox">
                  Locked by default
                </label>
                <label class="wide">
                  Description
                  <textarea id="storeFieldDescription"></textarea>
                </label>
                <label class="wide">
                  Flavor Text
                  <textarea id="storeFieldFlavorText"></textarea>
                </label>
                <label>
                  Inventory Type
                  <input id="storeFieldInventoryType">
                </label>
                <label>
                  Inventory Theme
                  <input id="storeFieldInventoryTheme">
                </label>
                <label>
                  Cost Type
                  <input id="storeFieldCostType">
                </label>
                <label class="wide">
                  Cost Preview
                  <input id="storeFieldCostPreview">
                </label>
                <label class="wide">
                  Inventory Note
                  <textarea id="storeFieldInventoryNote"></textarea>
                </label>
                <label class="wide">
                  Large Art Path
                  <input id="storeFieldLarge">
                </label>
                <label class="wide">
                  Notes
                  <textarea id="storeFieldNotes"></textarea>
                </label>
              </div>
            </section>

            <section class="panel json-panel">
              <div class="counts">
                <button id="loadStores" type="button">Load Stores</button>
                <button id="storeDownloadJson" type="button">Download Store JSON</button>
              </div>
              <div class="counts" id="storeExportSummary"></div>
              <textarea id="storeJsonOutput" class="json-output" readonly spellcheck="false"></textarea>
            </section>
          </section>
        </section>
      </section>
            </div>
          </section>
        </section>
      </section>
    </main>

    <datalist id="packOptions"></datalist>
    <datalist id="achievementCategoryOptions"></datalist>
    <datalist id="colorOptions">
      <option value="red"></option>
      <option value="orange"></option>
      <option value="yellow"></option>
      <option value="green"></option>
      <option value="blue"></option>
      <option value="purple"></option>
      <option value="black"></option>
      <option value="white"></option>
      <option value="silver"></option>
      <option value="gold"></option>
    </datalist>
    <datalist id="styleOptions">
      <option value="classic"></option>
      <option value="chrome"></option>
      <option value="neon"></option>
      <option value="clean"></option>
      <option value="worn"></option>
      <option value="courtroom"></option>
      <option value="noir"></option>
      <option value="patriotic"></option>
    </datalist>

    <script>
      const METADATA_URL = "../assets/cassettes/cassette-metadata.json";
      const ACHIEVEMENT_METADATA_URL = "../assets/achievements/achievement-metadata.json";
      const ACHIEVEMENT_ART_URL = "../assets/achievements/achievement-art.json";
      const STORE_METADATA_URL = "../assets/stores/store-metadata.json";
      const $ = (id) => document.getElementById(id);

      let metadata = { version: 2, updatedAt: "", cassettes: [] };
      let selectedId = "";
      let dirty = false;
      let achievementMetadata = { version: 1, updatedAt: "", achievements: [] };
      let selectedAchievementId = "";
      let achievementDirty = false;
      let achievementArt = { version: 1, updatedAt: "", images: [] };
      let storeMetadata = { version: 1, updatedAt: "", stores: [] };
      let selectedStoreId = "";
      let storeDirty = false;

      function setStatus(message) {
        $("status").textContent = message;
      }

      function assetUrl(path) {
        if (!path) return "";
        if (/^(https?:|data:|blob:)/.test(path)) return path;
        return `../${path}`.replace(/\/+/g, "/").replace("..", "..");
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function normalizeCassette(cassette, index) {

      function normalizeImagePath(value) {
        let path = String(value || "").trim().replaceAll("\\", "/");
        if (!path) return "";
        try {
          if (/^https?:\/\//i.test(path)) {
            const url = new URL(path);
            path = decodeURIComponent(url.pathname);
          }
        } catch {
          // Keep the original text if the pasted URL is malformed.
        }
        const assetIndex = path.toLowerCase().lastIndexOf("/assets/");
        if (assetIndex >= 0) path = path.slice(assetIndex + 1);
        const bareAssetIndex = path.toLowerCase().lastIndexOf("assets/");
        if (bareAssetIndex >= 0) path = path.slice(bareAssetIndex);
        path = path.replace(/^\/+/, "");
        return path;
      }

      function assignedAchievementArtCounts() {
        const counts = new Map();
        for (const achievement of achievementMetadata.achievements) {
          const path = normalizeImagePath(achievement.image);
          if (!path) continue;
          counts.set(path, (counts.get(path) || 0) + 1);
        }
        return counts;
      }

      function normalizeAchievementArt(data) {

        return {

          updatedAt: data?.updatedAt || "",
          images: images
            .map((image) => {
              const path = normalizeImagePath(image.path || image.file || image);
              if (!path) return null;
              return {
                path,
                file: image.file || path.split("/").pop(),
                label: image.label || (image.file || path.split("/").pop()).replace(/\.[^.]+$/, "")
              };
            })
            .filter(Boolean)
        };
      }

        const imagePaths = new Set(achievementArt.images.map((image) => image.path));
        const missing = [...assigned.keys()].filter((path) => path && !imagePaths.has(path));
        const used = achievementArt.images.filter((image) => assigned.has(image.path)).length;
        summary.innerHTML = [
          `<span class="pill">${achievementArt.images.length} art file${achievementArt.images.length === 1 ? "" : "s"}</span>`,

        grid.innerHTML = achievementArt.images.map((image) => {

      async function loadDefaultMetadata() {
        try {
          const response = await fetch(`${METADATA_URL}?t=${Date.now()}`, { cache: "no-store" });
          if (!response.ok) throw new Error(`Metadata load failed: ${response.status}`);
          metadata = normalizeMetadata(await response.json());
          selectedId = metadata.cassettes[0]?.id || "";
          dirty = false;
          render();
          setStatus(`Loaded ${metadata.cassettes.length} cassettes.`);
        } catch (error) {
          setStatus(error.message || "Could not load metadata.");
        }
      }

      function importJsonFile(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.addEventListener("load", () => {
          try {
            metadata = normalizeMetadata(JSON.parse(reader.result));
            selectedId = metadata.cassettes[0]?.id || "";
            dirty = false;
            render();
            setStatus(`Imported ${metadata.cassettes.length} cassettes.`);
          } catch (error) {
            setStatus(error.message || "Could not import JSON.");
          }
        });
        reader.readAsText(file);
      }

      async function copyJson() {
        if (!metadata.cassettes.length) return;
        await navigator.clipboard.writeText(outputJson());
        dirty = false;
        renderOutput();
        setStatus("JSON copied.");
      }

      function downloadJson() {
        if (!metadata.cassettes.length) return;
        const blob = new Blob([outputJson()], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "cassette-metadata.json";
        document.body.append(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        dirty = false;
        renderOutput();
        setStatus("cassette-metadata.json downloaded.");
      }

      async function loadAchievementMetadata() {
        try {
          const response = await fetch(`${ACHIEVEMENT_METADATA_URL}?t=${Date.now()}`, { cache: "no-store" });
          if (!response.ok) throw new Error(`Achievement metadata load failed: ${response.status}`);
          achievementMetadata = normalizeAchievementMetadata(await response.json());
          selectedAchievementId = achievementMetadata.achievements[0]?.id || "";
          achievementDirty = false;
          renderAchievements();
          await loadAchievementArt({ scroll: false });
          setStatus(`Loaded ${achievementMetadata.achievements.length} achievements and ${achievementArt.images.length} art files.`);
        } catch (error) {
          setStatus(error.message || "Could not load achievement metadata.");
        }
      }

      async function loadAchievementArt(options = {}) {
        try {
          const response = await fetch(`${ACHIEVEMENT_ART_URL}?t=${Date.now()}`, { cache: "no-store" });
          if (!response.ok) throw new Error(`Achievement art load failed: ${response.status}`);
          achievementArt = normalizeAchievementArt(await response.json());
          renderAchievementArtPicker();
          if (options.scroll !== false) {
            $("achievementArtGrid").scrollIntoView({ behavior: "smooth", block: "start" });
          }
          setStatus(`Loaded ${achievementArt.images.length} achievement art file${achievementArt.images.length === 1 ? "" : "s"}.`);
        } catch (error) {
          const message = error.message || "Could not load achievement art.";
          showAchievementArtError(message);
          setStatus(message);
        }
      }

      function cleanSelectedAchievementImagePath() {
        const achievement = currentAchievement();
        if (!achievement) return;
        const cleaned = normalizeImagePath($("achievementFieldImage").value);
        updateSelectedAchievement({ image: cleaned });
        setStatus(cleaned ? `Cleaned image path to ${cleaned}.` : "Image path cleared.");
      }

      function openSelectedAchievementImage() {
        const achievement = currentAchievement();
        const path = normalizeImagePath(achievement?.image || $("achievementFieldImage").value);
        if (!path) {
          setStatus("No achievement image path to open.");
          return;
        }
        window.open(assetUrl(path), "_blank", "noopener");
      }

      function importAchievementJsonFile(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.addEventListener("load", () => {
          try {
            achievementMetadata = normalizeAchievementMetadata(JSON.parse(reader.result));
            selectedAchievementId = achievementMetadata.achievements[0]?.id || "";
            achievementDirty = false;
            renderAchievements();
            setStatus(`Imported ${achievementMetadata.achievements.length} achievements.`);
          } catch (error) {
            setStatus(error.message || "Could not import achievement JSON.");
          }
        });
        reader.readAsText(file);
      }

      async function copyAchievementJson() {
        if (!achievementMetadata.achievements.length) return;
        await navigator.clipboard.writeText(achievementOutputJson());
        achievementDirty = false;
        renderAchievementOutput();
        setStatus("Achievement JSON copied.");
      }

      function downloadAchievementJson() {
        if (!achievementMetadata.achievements.length) return;
        const blob = new Blob([achievementOutputJson()], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "achievement-metadata.json";
        document.body.append(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        achievementDirty = false;
        renderAchievementOutput();
        setStatus("achievement-metadata.json downloaded.");
      }

      async function loadStoreMetadata() {
        try {
          const response = await fetch(`${STORE_METADATA_URL}?t=${Date.now()}`, { cache: "no-store" });
          if (!response.ok) throw new Error(`Store metadata load failed: ${response.status}`);
          storeMetadata = normalizeStoreMetadata(await response.json());
          selectedStoreId = storeMetadata.stores[0]?.id || "";
          storeDirty = false;
          renderStores();
          renderEditor();
          setStatus(`Loaded ${storeMetadata.stores.length} stores.`);
        } catch (error) {
          setStatus(error.message || "Could not load store metadata.");
        }
      }

      function downloadStoreJson() {
        if (!storeMetadata.stores.length) return;
        const blob = new Blob([storeOutputJson()], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "store-metadata.json";
        document.body.append(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        storeDirty = false;
        renderStoreOutput();
        setStatus("store-metadata.json downloaded.");
      }

      function activateTab(tabName) {
        document.querySelectorAll(".tab-button").forEach((button) => {
          button.setAttribute("aria-selected", String(button.dataset.tab === tabName));
        });
        document.querySelectorAll(".tab-panel").forEach((panel) => {
          panel.classList.toggle("active", panel.id === `${tabName}Tab`);
        });
        if (tabName === "stores" && !storeMetadata.stores.length) {
          loadStoreMetadata();
        }
        if (tabName === "achievements" && !achievementMetadata.achievements.length) {
          loadAchievementMetadata();
        }
      }

      $("loadDefault").addEventListener("click", loadDefaultMetadata);
      $("loadAchievements").addEventListener("click", () => {
        activateTab("achievements");
        loadAchievementMetadata();
      });
      $("loadStores").addEventListener("click", loadStoreMetadata);
      $("importButton").addEventListener("click", () => $("importFile").click());
      $("importFile").addEventListener("change", () => importJsonFile($("importFile").files[0]));
      $("copyJson").addEventListener("click", () => copyJson().catch(() => setStatus("Could not copy JSON.")));
      $("downloadJson").addEventListener("click", downloadJson);
      $("search").addEventListener("input", renderList);
      $("packFilter").addEventListener("change", renderList);
      $("rarityFilter").addEventListener("change", renderList);
      $("achievementImportButton").addEventListener("click", () => $("achievementImportFile").click());
      $("achievementImportFile").addEventListener("change", () => importAchievementJsonFile($("achievementImportFile").files[0]));
      $("achievementCopyJson").addEventListener("click", () => copyAchievementJson().catch(() => setStatus("Could not copy achievement JSON.")));
      $("achievementDownloadJson").addEventListener("click", downloadAchievementJson);
      $("cleanAchievementImagePath").addEventListener("click", cleanSelectedAchievementImagePath);
      $("openAchievementImage").addEventListener("click", openSelectedAchievementImage);
      $("loadAchievementArt").addEventListener("click", loadAchievementArt);
      $("achievementSearch").addEventListener("input", renderAchievementList);
      $("achievementCategoryFilter").addEventListener("change", renderAchievementList);
      $("achievementRarityFilter").addEventListener("change", renderAchievementList);
      $("storeDownloadJson").addEventListener("click", downloadStoreJson);
      $("storeSearch").addEventListener("input", renderStoreList);
      document.querySelectorAll(".tab-button").forEach((button) => {
        button.addEventListener("click", () => activateTab(button.dataset.tab));
      });

      bindField("fieldName", "name");
      bindField("fieldPack", "pack", (value) => value || "Unsorted");
      bindField("fieldOrderNumber", "orderNumber", (value) => Math.max(1, Number(value) || 1));
      bindField("fieldRarity", "rarity");
      bindField("fieldColor", "color");
      bindField("fieldStyle", "style");
      bindField("fieldStoreId", "storeId");
      bindField("fieldNotes", "notes");
      bindField("fieldIcon", "icon");
      bindField("fieldLarge", "large");
      $("fieldEnabled").addEventListener("change", () => updateSelected({ enabled: $("fieldEnabled").checked }));
      $("fieldStoreExclusive").addEventListener("change", () => updateSelected({ storeExclusive: $("fieldStoreExclusive").checked }));
      bindAchievementField("achievementFieldName", "name");
      bindAchievementField("achievementFieldDescription", "description");
      bindAchievementField("achievementFieldCategory", "category", (value) => value || "Listening");
      bindAchievementField("achievementFieldConditionType", "conditionType");
      bindAchievementField("achievementFieldTarget", "target", (value) => Math.max(1, Number(value) || 1));
      bindAchievementField("achievementFieldRarity", "rarity");
      bindAchievementField("achievementFieldImage", "image");
      bindAchievementField("achievementFieldNotes", "notes");
      $("achievementFieldEnabled").addEventListener("change", () => updateSelectedAchievement({ enabled: $("achievementFieldEnabled").checked }));
      $("achievementFieldHidden").addEventListener("change", () => updateSelectedAchievement({ hiddenUntilUnlocked: $("achievementFieldHidden").checked }));
      $("achievementFieldRepeatable").addEventListener("change", () => updateSelectedAchievement({ repeatable: $("achievementFieldRepeatable").checked }));
      bindStoreField("storeFieldName", "name");
      bindStoreField("storeFieldTheme", "theme");
      bindStoreField("storeFieldStatus", "status");
      bindStoreField("storeFieldStoreType", "storeType");
      bindStoreField("storeFieldUnlockCondition", "unlockCondition");
      bindStoreField("storeFieldDescription", "description");
      bindStoreField("storeFieldFlavorText", "flavorText");
      bindStoreField("storeFieldInventoryType", "inventoryType");
      bindStoreField("storeFieldInventoryTheme", "inventoryTheme");
      bindStoreField("storeFieldCostType", "costType");
      bindStoreField("storeFieldCostPreview", "costPreview");
      bindStoreField("storeFieldInventoryNote", "inventoryNote");
      bindStoreField("storeFieldLarge", "large");
      bindStoreField("storeFieldNotes", "notes");
      $("storeFieldEnabled").addEventListener("change", () => updateSelectedStore({ enabled: $("storeFieldEnabled").checked }));
      $("storeFieldLocked").addEventListener("change", () => updateSelectedStore({ lockedByDefault: $("storeFieldLocked").checked }));

      loadDefaultMetadata();
      loadAchievementMetadata();
      loadStoreMetadata();
    </script>
  </body>
</html>
