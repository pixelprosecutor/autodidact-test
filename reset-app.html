<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset Autodidact Cache</title>
    <style>
      :root {
        color-scheme: dark;
        --paper: #07162f;
        --panel: #10284d;
        --line: #29446e;
        --ink: #f7fbff;
        --muted: #a9b9d6;
        --accent: #7dd3fc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        max-width: 680px;
        margin: 0 auto;
        padding: 24px 14px;
        background: var(--paper);
        color: var(--ink);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.45;
      }

      .panel {
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(16, 40, 77, .84);
      }

      p {
        color: var(--muted);
      }

      a,
      button {
        min-height: 42px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-top: 10px;
        border: 1px solid var(--accent);
        border-radius: 8px;
        padding: 8px 12px;
        background: var(--accent);
        color: #07162f;
        font: inherit;
        font-weight: 750;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>Refreshing Autodidact</h1>
      <p id="status">Clearing the old app shell cache.</p>
      <a id="openApp" href="index.html?v=cassette-duplicate-announcements-1" hidden>Open Autodidact</a>
    </main>

    <script>
      const status = document.getElementById("status");
      const openApp = document.getElementById("openApp");

      async function resetAppShell() {
        try {
          if ("serviceWorker" in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
          }

          if ("caches" in window) {
            const names = await caches.keys();
            await Promise.all(names.map((name) => caches.delete(name)));
          }

          status.textContent = "Old app shell cache cleared. Opening the newest build.";
          openApp.hidden = false;
          window.setTimeout(() => {
            window.location.replace("index.html?v=cassette-duplicate-announcements-1");
          }, 900);
        } catch {
          status.textContent = "Cache reset could not finish automatically. Tap Open Autodidact.";
          openApp.hidden = false;
        }
      }

      resetAppShell();
    </script>
  </body>
</html>
